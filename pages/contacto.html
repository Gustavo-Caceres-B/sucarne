<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | SUCARNE San Fernando y Rancagua</title>
    <!-- SEO -->
    <meta name="description" content="Contáctanos para cotizaciones, pedidos y consultas. Carnicería SUCARNE con sucursales en San Fernando y Rancagua. Atención también por WhatsApp.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://sucarne.cl/pages/contacto.html">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Contacto | SUCARNE San Fernando y Rancagua">
    <meta property="og:description" content="Contáctanos para cotizaciones, pedidos y consultas. Carnicería SUCARNE con sucursales en San Fernando y Rancagua. Atención también por WhatsApp.">
    <meta property="og:url" content="https://sucarne.cl/pages/contacto.html">
    <meta property="og:image" content="https://sucarne.cl/assets/images/backgrounds/contacto_bg.png">
    <meta property="og:locale" content="es_CL">
    <meta property="og:site_name" content="SUCARNE">
    <link rel="icon" type="image/png" href="../assets/images/logos/logo_sucarne.backup.webp">
    <!-- Google Fonts (asíncrono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap"></noscript>
    <!-- Font Awesome (asíncrono) -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <!-- Header superior azul -->
    <div id="site-header"></div>

    <!-- Página de Contacto -->
    <section class="contact-section">
        <div class="contact-wrapper">
            <div class="contact-image" style="background-image: url('../assets/images/backgrounds/contacto_bg.webp');"></div>
            <div class="contact-card">
                <div class="contact-header">
                    <h1>Mándanos un Mensaje</h1>
                    <p>Déjanos tus consultas, cotizaciones o sugerencias directamente en nuestro buzón.</p>
                </div>
                
                <!-- Formulario Web3Forms - Solo necesitas tu access key -->
                <form action="https://api.web3forms.com/submit" method="POST" class="contact-form" id="contactForm">
                    <!-- Access key Web3Forms (se asigna según sucursal) -->
                    <input type="hidden" name="access_key" id="accessKey" value="">

                    <!-- Nombre del remitente en correo -->
                    <input type="hidden" name="from_name" value="SUCARNE Web">

                    <!-- Metadata para identificar sucursal en el correo -->
                    <input type="hidden" name="Sucursal destino" id="emailDestino" value="">

                    <!-- Asunto dinámico según sucursal -->
                    <input type="hidden" name="subject" id="subjectHidden" value="Nuevo contacto - SUCARNE">

                    <!-- Redireccion despues de enviar -->
                    <input type="hidden" name="redirect" id="redirectUrl" value="">

                    <div class="form-group">
                        <label for="nombre">Nombre *</label>
                        <input type="text" id="nombre" name="Nombre" placeholder="Ingresa tu nombre completo" required>
                    </div>

                    <div class="form-group">
                        <label for="sucursal">Sucursal de Destino *</label>
                        <select id="sucursal" name="Sucursal" required onchange="actualizarEmail()">
                            <option value="">-- Selecciona una sucursal --</option>
                            <option value="san_fernando">Sucursal San Fernando</option>
                            <option value="rancagua">Sucursal Rancagua</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="correo">Correo Electrónico *</label>
                        <input type="email" id="correo" name="replyto" placeholder="ejemplo@correo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono (opcional)</label>
                        <input type="tel" id="telefono" name="Teléfono" placeholder="+56 9 1234 5678">
                    </div>

                    <div class="form-group">
                        <label for="asunto">Asunto (opcional)</label>
                        <input type="text" id="asunto" name="Asunto" placeholder="Cotización, Duda, Reclamo...">
                    </div>

                    <div class="form-group">
                        <label for="mensaje">Mensaje *</label>
                        <textarea id="mensaje" name="Mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-red btn-submit" id="submitBtn">
                        <i class="fa-solid fa-paper-plane"></i> Enviar Mensaje
                    </button>

                    <div id="formStatus" style="margin-top: 15px; text-align: center; display: none;"></div>
                </form>

                <script>
                    // IMPORTANTE:
                    // Crea 2 access keys en Web3Forms (una por correo destino) y pégalas aquí.
                    const CONFIG_SUCURSAL = {
                        san_fernando: {
                            label: 'Sucursal San Fernando',
                            accessKey: '95e7727a-7aa7-42b0-815c-f98c2514c362'
                        },
                        rancagua: {
                            label: 'Sucursal Rancagua',
                            accessKey: '7f813968-fdcb-423d-aef4-485a241dd75e'
                        }
                    };

                    function actualizarEmail() {
                        const sucursal = document.getElementById('sucursal').value;
                        const emailField = document.getElementById('emailDestino');
                        const accessKeyField = document.getElementById('accessKey');
                        const subjectHidden = document.getElementById('subjectHidden');

                        if (sucursal && CONFIG_SUCURSAL[sucursal]) {
                            const cfg = CONFIG_SUCURSAL[sucursal];
                            emailField.value = cfg.label;
                            accessKeyField.value = cfg.accessKey;
                            subjectHidden.value = `Nuevo contacto web - ${sucursal === 'san_fernando' ? 'Sucursal San Fernando' : 'Sucursal Rancagua'}`;
                        } else {
                            emailField.value = '';
                            accessKeyField.value = '';
                            subjectHidden.value = 'Nuevo contacto web - SUCARNE';
                        }
                    }

                    // URL de éxito dinámica (sirve en dominio real, IP local o subcarpeta)
                    const redirectUrl = document.getElementById('redirectUrl');
                    if (redirectUrl) {
                        redirectUrl.value = new URL('../gracias.html', window.location.href).href;
                    }

                    // Validación antes de enviar
                    document.getElementById('contactForm').addEventListener('submit', function(e) {
                        const sucursal = document.getElementById('sucursal').value;
                        const emailDestino = document.getElementById('emailDestino').value;
                        const accessKey = document.getElementById('accessKey').value;
                        const asuntoUsuario = document.getElementById('asunto').value.trim();
                        const subjectHidden = document.getElementById('subjectHidden');

                        if (!sucursal || !emailDestino || !accessKey || accessKey.includes('ACCESS_KEY_')) {
                            e.preventDefault();
                            const formStatus = document.getElementById('formStatus');
                            formStatus.innerHTML = '<p style="color: red;"><i class="fa-solid fa-exclamation-circle"></i> Falta configurar la sucursal o la access key correspondiente.</p>';
                            formStatus.style.display = 'block';
                            return false;
                        }

                        if (asuntoUsuario) {
                            subjectHidden.value += ` | ${asuntoUsuario}`;
                        }

                        // Mostrar mensaje de envío
                        const submitBtn = document.getElementById('submitBtn');
                        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Enviando...';
                        submitBtn.disabled = true;

                        sessionStorage.setItem('contacto_ok', '1');
                        return true;
                    });
                </script>
                </div>
            </div>
    </section>

        <!-- Footer -->
    <div id="site-footer"></div>

    <!-- Flotantes Whatsapp Compartido -->
    <div class="wa-float-container">
        <a href="https://wa.me/56971387793" class="wa-float" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp San Fernando">
            <i class="fa-brands fa-whatsapp"></i> San Fernando
        </a>
        <a href="https://wa.me/56971258082" class="wa-float" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp Rancagua">
            <i class="fa-brands fa-whatsapp"></i> Rancagua
        </a>
    </div>

    <script src="../js/header-loader.js"></script>
    <script src="../js/footer-loader.js"></script>
    <script src="../js/script.js"></script>
</body>

</html>
