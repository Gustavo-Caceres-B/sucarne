<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje Enviado | SUCARNE</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="assets/images/logos/logo_sucarne.backup.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .gracias-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at 20% 15%, rgba(255,255,255,0.1) 0%, transparent 35%),
                        radial-gradient(circle at 80% 85%, rgba(255,255,255,0.08) 0%, transparent 40%),
                        linear-gradient(135deg, #3E4B99 0%, #2c3e87 55%, #1f2e70 100%);
            color: white;
            padding: clamp(40px, 8vh, 80px) 24px 24px;
        }

        .gracias-logo-wrap {
            width: min(820px, 100%);
            display: flex;
            justify-content: center;
            margin-bottom: 26px;
        }

        .gracias-logo {
            height: clamp(110px, 14vw, 170px);
            object-fit: contain;
            filter: drop-shadow(0 10px 24px rgba(0,0,0,0.32));
        }

        .gracias-card {
            width: min(720px, 100%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 22px;
            padding: 38px 28px 30px;
            backdrop-filter: blur(8px);
            box-shadow: 0 18px 48px rgba(0,0,0,0.26);
        }

        .gracias-icon {
            font-size: 4.2rem;
            color: #F6C844;
            margin: 0 0 16px;
        }

        .gracias-container h1 {
            font-size: 2.4rem;
            margin-bottom: 12px;
            line-height: 1.15;
        }

        .gracias-container p {
            font-size: 1.05rem;
            margin-bottom: 10px;
            opacity: 0.95;
        }

        .gracias-sub {
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 24px;
        }

        .btn-volver {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #EE2C3C;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-volver:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="gracias-container">
        <div class="gracias-logo-wrap">
            <img src="assets/images/logos/logo_sucarne.backup.png" alt="SUCARNE" class="gracias-logo">
        </div>
        <div class="gracias-card">
            <i class="fa-solid fa-check-circle gracias-icon"></i>
            <h1>¡Mensaje Enviado!</h1>
            <p>Gracias por contactarnos. Tu mensaje fue recibido correctamente.</p>
            <p class="gracias-sub">Te responderemos a la brevedad. Serás redirigido al inicio en <strong id="countdown">7</strong> segundos.</p>
            <a href="./index.html" class="btn-volver">
                <i class="fa-solid fa-arrow-left"></i> Volver al Inicio
            </a>
        </div>
    </div>

    <script>
        let seconds = 7;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            if (el) el.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = './index.html';
            }
        }, 1000);
    </script>
</body>
</html>
